<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fart Rocket 🚀💨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="highScore">Best: 0</div>
    </div>
    <div id="startScreen" class="screen">
        <h1>💨 FART ROCKET 💨</h1>
        <p>Press Space or tap to boost the rocket</p>
        <p>Avoid obstacles. Collect stars.</p>
        <button id="startBtn">START GAME</button>
    </div>
    <div id="gameOverScreen" class="screen hidden">
        <h1>GAME OVER</h1>
        <p id="finalScore">Score: 0</p>
        <div id="scoreSubmit">
            <input type="text" id="nicknameInput" maxlength="20" placeholder="Your nickname (optional)">
            <button id="submitScoreBtn">SUBMIT SCORE</button>
            <p id="submitStatus"></p>
        </div>
        <div id="leaderboard">
            <h2>🏆 LEADERBOARD</h2>
            <div id="leaderboardEntries"></div>
        </div>
        <button id="restartBtn">PLAY AGAIN</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
